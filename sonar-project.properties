# SonarCloud 프로젝트 정보
sonar.projectKey=rgkim-hsu_smartsilo
sonar.organization=rgkim-hsu

# 프로젝트 메타데이터
sonar.projectName=SmartSilo Grain Storage Control System
sonar.projectVersion=1.0

# 소스 코드 위치 (Desktop App + Server)
sonar.sources=desktop_app,server

# 테스트 위치 (있다면)
# sonar.tests=desktop_app/tests,server/tests

# JavaScript/Vue 설정
sonar.javascript.lcov.reportPaths=desktop_app/coverage/lcov.info,server/coverage/lcov.info

# 제외할 파일/폴더
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/__readme/**,**/*.spec.js,**/*.test.js,**/octave/**,**/*.m

# Vue.js 파일 확장자 지정
sonar.vue.file.suffixes=.vue

# 중복 검사 제외
sonar.cpd.exclusions=**/*.spec.js,**/*.test.js
